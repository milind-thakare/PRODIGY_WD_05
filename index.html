<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="weather-container">
        <h1>Weather Forecast</h1>
        
        <div class="input-section">
            <input type="text" id="city-input" placeholder="Enter city name...">
            <button id="search-btn">Search</button>
        </div>
        
        <div class="divider">OR</div>
        
        <button id="location-btn">Use My Current Location</button>

        <div id="loading" class="hidden">Fetching weather data...</div>
        <div id="error-message" class="hidden error"></div>

        <div id="weather-result" class="hidden">
            <h2 id="location-name">--</h2>
            <div class="temperature">
                <span id="temp-value">--</span>°C
            </div>
            <div id="weather-description" class="description">--</div>
            
            <div class="details">
                <div class="detail-item">
                    <span>Wind Speed:</span>
                    <span id="wind-speed">-- km/h</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
